{% extends "base.html" %}

{% block title %}登入 - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">登入帳號</h3>
                
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email 地址</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-3">登入</button>
                </form>
                
                <div class="text-center mt-3">
                    <span class="text-muted">還沒有帳號嗎？</span> 
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即註冊</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
