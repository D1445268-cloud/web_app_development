{% extends "base.html" %}

{% block title %}{{ '編輯食譜' if action == 'edit' else '新增食譜' }} - 食譜收藏夾{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title mb-4">{{ '編輯食譜' if action == 'edit' else '建立新食譜' }}</h3>
                
                <form action="{{ url_for('recipe.edit_recipe', id=recipe.id) if action == 'edit' else url_for('recipe.new_recipe') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required 
                               value="{{ recipe.title if recipe else '' }}" placeholder="例如：日式咖哩雞">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="category" class="form-label fw-bold">分類標籤</label>
                            <input type="text" class="form-control" id="category" name="category" 
                                   value="{{ recipe.category if recipe else '' }}" placeholder="例如：中式、便當、甜點">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="image_url" class="form-label fw-bold">圖片網址</label>
                            <input type="url" class="form-control" id="image_url" name="image_url" 
                                   value="{{ recipe.image_url if recipe else '' }}" placeholder="https://example.com/image.jpg">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="ingredients" class="form-label fw-bold">食材清單 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="ingredients" name="ingredients" rows="3" required 
                                  placeholder="請輸入所需食材，並以逗號分隔。例如：雞胸肉 300g, 洋蔥 1顆, 紅蘿蔔 半根">{{ recipe.ingredients if recipe else '' }}</textarea>
                        <div class="form-text">請務必使用「逗號」分隔不同食材，以便於未來透過食材搜尋！</div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="steps" class="form-label fw-bold">製作步驟 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="steps" name="steps" rows="6" required 
                                  placeholder="1. 將洋蔥切絲...&#10;2. 雞肉下鍋拌炒...">{{ recipe.steps if recipe else '' }}</textarea>
                    </div>
                    
                    <div class="mb-4 form-check form-switch">
                        <input class="form-check-input" type="checkbox" role="switch" id="is_public" name="is_public" 
                               {% if action == 'new' or (recipe and recipe.is_public) %}checked{% endif %}>
                        <label class="form-check-label fw-bold" for="is_public">公開這份食譜</label>
                        <div class="form-text text-muted">關閉後，只有您自己能看到並搜尋到這份食譜。</div>
                    </div>
                    
                    <hr class="my-4">
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="javascript:history.back()" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-primary px-4">{{ '儲存變更' if action == 'edit' else '建立食譜' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
